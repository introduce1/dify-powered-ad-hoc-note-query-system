    - data:
        code: "import re\nimport json\n\ndef main(sql_string) :\n    # 检查输入参数类型\n\
          \    if not isinstance(sql_string, str):\n        return {\n           \
          \ \"result\": \"Error: input should be a string.\"\n        }\n    \n  \
          \  # 移除代码块标记和反斜杠n\n    sql_string = re.sub(r'```sql\\s*', '', sql_string)\n\
          \    sql_string = re.sub(r'\\s*```', '', sql_string)\n    sql_string = sql_string.replace('\\\
          \\n', ' ')\n    \n    # 移除多余的空白字符\n    sql_string = ' '.join(sql_string.split())\
          \    \n    \n    return {\n        \"result\": sql_string,\n    }"
        code_language: python3
